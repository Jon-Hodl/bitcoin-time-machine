<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a2744"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7931a"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Clock Icon -->
  <text x="600" y="180" text-anchor="middle" font-size="100" fill="#f7931a">⏳</text>
  
  <!-- Title -->
  <text x="600" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#ffffff">Bitcoin Time Machine</text>
  
  <!-- Subtitle -->
  <text x="600" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#a0a0a0">Prove the 4-Year HODL Thesis Visually</text>
  
  <!-- Feature list -->
  <text x="600" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#22c55e">✓ Transaction Analysis ✓ Anniversary Charts ✓ Profit/Loss Calculator</text>
  
  <!-- Decorative line -->
  <line x1="300" y1="500" x2="900" y2="500" stroke="url(#orange)" stroke-width="3"/>
  
  <!-- URL -->
  <text x="600" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#666666">jon-hodl.github.io/bitcoin-time-machine</text>
</svg>